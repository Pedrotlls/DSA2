<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Exemplo Básico JS</title>
</head>
<body>
 
    <h1 id="titulo">Olá Mundo!</h1>
<button id="meuBotao">Clique em mim</button>
 
    <script>

        // Seleciona os elementos HTML

        const botao = document.getElementById('meuBotao');

        const titulo = document.getElementById('titulo');
 
        // Adiciona um evento de clique

        botao.addEventListener('click', function() {

            titulo.textContent = 'O texto mudou com JavaScript!';

            document.body.style.backgroundColor = 'lightblue'; // Exemplo do {Link: YouTube https://www.youtube.com/watch?v=NLxbx8zPy9w}

        });
</script>
 
</body>
</html>
