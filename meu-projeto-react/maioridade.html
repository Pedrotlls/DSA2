<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Verificação de Idade</title>
</head>
<body>
<h2>Verificador de Maioridade</h2>
<script>

        // Solicita a idade e converte para número

        let idade = prompt("Digite sua idade:");

        idade = parseInt(idade);
 
        // Verifica a condição

        if (idade >= 18) {

            document.write("<h3>Você tem " + idade + " anos e é maior de idade.</h3>");

        } else {

            document.write("<h3>Você tem " + idade + " anos e é menor de idade.</h3>");

        }
</script>
</body>
</html>
